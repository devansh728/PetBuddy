version: '3.8'

services:
  minio:
    image: minio/minio:latest
    container_name: petbuddy-minio
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin123
    ports:
      - "9000:9000" # API Port (Your Spring Boot app and clients talk to this)
      - "9001:9001" # Web Console Port (You log in here)
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  minio-init:
    image: minio/mc:latest
    container_name: petbuddy-minio-init
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./minio/cors.json:/etc/minio/cors.json:ro
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin123;
      mc mb -p local/petbuddy-media || true;
      mc anonymous set public local/petbuddy-media || true;
      mc cors set local/petbuddy-media /etc/minio/cors.json;
      echo 'MinIO initialization complete';
      exit 0;
      "

volumes:
  minio_data: