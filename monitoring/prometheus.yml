global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: "spring-microservices"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets:
          - "host.docker.internal:8080" # api-gateway
          - "host.docker.internal:9090" # profile-rescue-svc (Note: gRPC port, Actuator on same port via management)
          - "host.docker.internal:9091" # social-stream-svc (Note: gRPC port, Actuator on same port via management)
        labels:
          environment: "local-dev"

      # Individual service labels for better filtering in Grafana
      - targets: ["host.docker.internal:8080"]
        labels:
          service: "api-gateway"
          type: "graphql"

      - targets: ["host.docker.internal:9090"]
        labels:
          service: "profile-rescue-svc"
          type: "grpc"

      - targets: ["host.docker.internal:9091"]
        labels:
          service: "social-stream-svc"
          type: "grpc"
