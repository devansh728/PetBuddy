syntax = "proto3";

package com.petbuddy.social;

option java_multiple_files = true;
option java_package = "com.petbuddy.social.grpc";
option java_outer_classname = "SocialServiceProto";

// Social Service for Posts, Feed, and Media handling
service SocialService {
  // Generate presigned URL for direct S3 upload
  rpc GetPresignedUploadUrl (UploadRequest) returns (UploadResponse);
  
  // Create a new post
  rpc CreatePost (CreatePostRequest) returns (PostResponse);
  
  // Get paginated feed
  rpc GetFeed (FeedRequest) returns (FeedResponse);
  
  // Like/Unlike a post
  rpc ToggleLike (LikeRequest) returns (LikeResponse);
  
  // Get post by ID
  rpc GetPost (GetPostRequest) returns (PostResponse);
}

// Request for presigned upload URL
message UploadRequest {
  string file_name = 1;
  string content_type = 2;  // e.g., "image/jpeg", "video/mp4"
  string user_id = 3;
}

// Response with presigned URL
message UploadResponse {
  string upload_url = 1;      // Presigned PUT URL
  string media_key = 2;       // S3 object key
  int64 expires_in_seconds = 3;
}

// Request to create a post
message CreatePostRequest {
  string user_id = 1;
  string caption = 2;
  string media_key = 3;       // S3 key from upload
  double location_lat = 4;
  double location_lon = 5;
}

// Post response
message PostResponse {
  string post_id = 1;
  string user_id = 2;
  string caption = 3;
  string media_url = 4;       // Full S3 URL
  double location_lat = 5;
  double location_lon = 6;
  int32 like_count = 7;
  int32 comment_count = 8;
  bool is_liked = 9;
  string created_at = 10;
}

// Feed request
message FeedRequest {
  string user_id = 1;
  int32 page_number = 2;
  int32 page_size = 3;
}

// Feed response
message FeedResponse {
  repeated PostResponse posts = 1;
  int32 total_pages = 2;
  bool has_more = 3;
}

// Like request
message LikeRequest {
  string user_id = 1;
  string post_id = 2;
}

// Like response
message LikeResponse {
  bool is_liked = 1;
  int32 like_count = 2;
}

// Get post by ID request
message GetPostRequest {
  string post_id = 1;
  string requesting_user_id = 2;  // To check if liked
}
