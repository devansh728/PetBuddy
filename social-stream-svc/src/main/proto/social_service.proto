syntax = "proto3";

package com.petbuddy.social;

option java_multiple_files = true;
option java_package = "com.petbuddy.social.grpc";
option java_outer_classname = "SocialServiceProto";

// Social Service for Posts, Feed, and Media handling
service SocialService {
  rpc GetPresignedUploadUrl (UploadRequest) returns (UploadResponse);
  
  rpc CreatePost (CreatePostRequest) returns (PostResponse);
  
  rpc GetFeed (FeedRequest) returns (FeedResponse);

  rpc GetUserPosts (GetUserPostsRequest) returns (FeedResponse);
  
  rpc ToggleLike (LikeRequest) returns (LikeResponse);
  
  rpc GetPost (GetPostRequest) returns (PostResponse);

  rpc GetNotifications (GetNotificationsRequest) returns (NotificationsResponse);

  rpc MarkNotificationAsRead (MarkNotificationReadRequest) returns (EmptyResponse);

  rpc GetUnreadNotificationCount (EmptyRequest) returns (UnreadCountResponse);
}

message UploadRequest {
  string file_name = 1;
  string content_type = 2;
  string user_id = 3;
}

message UploadResponse {
  string upload_url = 1;
  string media_key = 2;
  int64 expires_in_seconds = 3;
}

message CreatePostRequest {
  string user_id = 1;
  string caption = 2;
  string media_key = 3;
  double location_lat = 4;
  double location_lon = 5;
}

message PostResponse {
  string post_id = 1;
  string user_id = 2;
  string author_username = 3;
  string caption = 4;
  string media_url = 5;
  double location_lat = 6;
  double location_lon = 7;
  int32 like_count = 8;
  int32 comment_count = 9;
  bool is_liked = 10;
  string created_at = 11;
}

message FeedRequest {
  string user_id = 1;
  int32 page_number = 2;
  int32 page_size = 3;
}

message GetUserPostsRequest {
  string user_id = 1;
  string requesting_user_id = 2;
  int32 page_number = 3;
  int32 page_size = 4;
}

message FeedResponse {
  repeated PostResponse posts = 1;
  int32 total_pages = 2;
  bool has_more = 3;
}

// Like request
message LikeRequest {
  string user_id = 1;
  string post_id = 2;
}

// Like response
message LikeResponse {
  bool is_liked = 1;
  int32 like_count = 2;
}

// Get post by ID request
message GetPostRequest {
  string post_id = 1;
  string requesting_user_id = 2;
}

message NotificationMessage {
  string notification_id = 1;
  string actor_username = 2;
  string notification_type = 3;
  string post_id = 4;
  string post_caption = 5;
  string media_url = 6;
  bool is_read = 7;
  string created_at = 8;
}

message GetNotificationsRequest {
  string user_id = 1;
  int32 page_number = 2;
  int32 page_size = 3;
}

message NotificationsResponse {
  repeated NotificationMessage notifications = 1;
  int32 total_pages = 2;
  bool has_more = 3;
  int32 unread_count = 4;
}

message MarkNotificationReadRequest {
  string notification_id = 1;
}

message GetUnreadCountRequest {
  string user_id = 1;
}

message UnreadCountResponse {
  int32 count = 1;
}

message EmptyRequest {
  string user_id = 1;
}

message EmptyResponse {
}
